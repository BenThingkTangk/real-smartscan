<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartCast — R.E.A.L. SmartScan</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #080C14; color: #E2E8F0; font-family: Inter, sans-serif; min-height: 100vh; }
  .player-wrap { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
  video { width: 100%; border-radius: 16px; background: #0F172A; aspect-ratio: 16/9; }
  .video-container { position: relative; border-radius: 16px; overflow: hidden; background: #0F172A; }
  .video-overlay { position: absolute; top: 12px; left: 12px; display: flex; gap: 8px; align-items: center; }
  .live-badge { background: #EF4444; color: #fff; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 4px; letter-spacing: 0.08em; }
  .cred-badge { background: rgba(6,182,212,0.15); border: 1px solid rgba(6,182,212,0.3); color: #06B6D4; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 4px; }
  .info-card { background: rgba(15,23,42,0.8); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 20px; margin-top: 16px; }
  h1 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
  .price-tag { font-size: 28px; font-weight: 900; color: #10B981; font-family: 'JetBrains Mono', monospace; }
  .buy-btn { display: inline-block; background: #F97316; color: #fff; padding: 12px 28px; border-radius: 10px; font-weight: 700; text-decoration: none; margin-top: 16px; font-size: 15px; }
  .back-link { display: inline-flex; align-items: center; gap: 6px; color: #06B6D4; text-decoration: none; font-size: 13px; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="player-wrap">
  <a href="/" class="back-link">← Back to SmartScan</a>
  <div class="video-container">
    <video id="video" controls playsinline></video>
    <div class="video-overlay">
      <span class="live-badge" id="live-badge" style="display:none">● LIVE</span>
      <span class="cred-badge" id="cred-badge"></span>
    </div>
  </div>
  <div class="info-card" id="info-card">
    <h1 id="title">Loading...</h1>
    <div class="price-tag" id="price"></div>
    <p id="description" style="color:#94A3B8;margin-top:8px;font-size:14px;line-height:1.6;"></p>
    <a href="/" class="buy-btn" id="buy-btn">🛒 Find Best Price on SmartScan</a>
  </div>
</div>
<script>
const params = new URLSearchParams(location.search);
const id = params.get('id');
const videoUrl = params.get('url');
const video = document.getElementById('video');

if (videoUrl) {
  if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(videoUrl);
    hls.attachMedia(video);
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = videoUrl;
  } else {
    video.src = videoUrl; // Direct MP4 fallback
  }
}

if (id) {
  fetch('/api/smartcast-feed?limit=50').then(r=>r.json()).then(d => {
    const b = d.broadcasts?.find(x => x.id === id);
    if (b) {
      document.getElementById('title').textContent = b.title || 'SmartCast Broadcast';
      document.getElementById('description').textContent = b.description || '';
      if (b.price) document.getElementById('price').textContent = '$' + b.price;
      if (b.credibility_score) document.getElementById('cred-badge').textContent = '✓ ' + b.credibility_score + '/100 Verified';
      if (b.status === 'live') document.getElementById('live-badge').style.display = 'inline';
      if (b.title) document.getElementById('buy-btn').href = '/#/search?q=' + encodeURIComponent(b.title);
      document.title = (b.title || 'SmartCast') + ' — R.E.A.L. SmartScan';
      if (!videoUrl && b.video_url) video.src = b.video_url;
    }
  });
}
</script>
</body>
</html>
